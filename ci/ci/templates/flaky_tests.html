{% extends "layout.html" %}
{% block title %}Flaky Tests{% endblock %}
{% block head %}
<script type="module" src="{{ base_path }}/ci/static/compiled-js/flaky_tests.js"></script>
{% endblock %}
{% block content %}
<h1 class="text-2xl font-light mb-2">Flaky Test Dashboard</h1>
<p class="text-slate-500 mb-4">Most-retried test jobs in the last 14 days.</p>
<div id="flaky-tests-root" data-base-path="{{ base_path }}">
  <div class="flex items-center gap-2 mt-4 text-slate-500">
    <svg class="animate-spin h-5 w-5 text-sky-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
      <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
      <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
    </svg>
    Loading&hellip;
  </div>
</div>
{% endblock %}
